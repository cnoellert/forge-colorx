name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: evaluator unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + run the 36 evaluator unit tests
        run: |
          g++ -std=c++11 -O2 -I ofx/Expression tests/test_expr.cpp -o test_expr
          ./test_expr

      # Differential check that the AST->kernel transpiler (Program::emitC, the
      # basis of the GPU back-ends) matches the CPU evaluator. Compiles the
      # generated kernels and dlopens them, so it needs no GPU.
      - name: Build + run the transpiler differential test
        run: |
          c++ -std=c++11 -O2 -I ofx/Expression tests/test_transpile.cpp -o test_transpile
          ./test_transpile

  metal:
    name: metal back-end (MSL compile-check + GPU diff)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the Metal tests
        run: |
          clang++ -std=c++17 -ObjC++ -O2 -I ofx/Expression tests/test_metal.mm \
            -framework Metal -framework Foundation -o test_metal
          clang++ -std=c++17 -ObjC++ -O2 -I ofx/Expression \
            tests/test_metal_render.mm ofx/Expression/ExprMetal.mm \
            -framework Metal -framework Foundation -o test_metal_render

      # Offline MSL compile-check: emit the generated kernels (scalar diff kernels
      # AND a representative production pixel kernel) and run them through Apple's
      # `metal` compiler. This validates ExprKernelMetal.h + every emitted body as
      # real Metal Shading Language with NO GPU — the macOS runners are headless
      # VMs. (The CUDA back-end will get the analogous nvrtc compile-check.)
      - name: Compile emitted MSL with xcrun metal
        run: |
          ./test_metal --emit kernels.metal
          ./test_metal_render --emit pixel.metal
          xcrun -sdk macosx metal -c kernels.metal -o kernels.air
          xcrun -sdk macosx metal -c pixel.metal   -o pixel.air
          echo "MSL compiled clean (scalar + pixel kernels)"

      # If the runner happens to expose a Metal device, run the real GPU
      # differential + pixel-path checks too; both SKIP (exit 0) when none.
      - name: Run the GPU tests (SKIP if headless)
        run: |
          ./test_metal
          ./test_metal_render

  cuda:
    name: cuda back-end (NVRTC compile-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NVRTC is a runtime compiler library — it turns our generated CUDA source
      # into PTX with NO GPU, so this gates the CUDA codegen on a GPU-less runner
      # (the analogue of the macОS `xcrun metal` check). The distro CUDA toolkit
      # ships nvrtc.h + libnvrtc; we locate them rather than assume a fixed path.
      - name: Install CUDA NVRTC
        run: |
          sudo apt-get update
          sudo apt-get install -y nvidia-cuda-toolkit

      - name: Build + run the NVRTC compile-check
        run: |
          NVRTC_H="$(dirname "$(find / -name nvrtc.h 2>/dev/null | head -1)")"
          NVRTC_L="$(dirname "$(find / -name 'libnvrtc.so*' 2>/dev/null | head -1)")"
          echo "nvrtc.h in: $NVRTC_H   libnvrtc in: $NVRTC_L"
          test -n "$NVRTC_H" && test -n "$NVRTC_L" || { echo "::error::NVRTC not found"; exit 1; }
          c++ -std=c++11 -O2 -I ofx/Expression -I"$NVRTC_H" \
            tests/test_cuda.cpp -o test_cuda -L"$NVRTC_L" -lnvrtc
          LD_LIBRARY_PATH="$NVRTC_L" ./test_cuda

      # The runtime differential test (test_cuda_run.cpp) needs a real GPU+driver
      # to *run* (it SKIPs cleanly otherwise) — it's GPU-verified on the NVIDIA box
      # (RTX 5000 Ada), not here. But compile+link it against the driver API headers
      # + libcuda stub so CI still gates the driver-API code for signature drift.
      - name: Compile-link the runtime differential test (driver API)
        run: |
          CUDA_H="$(dirname "$(find / -name cuda.h 2>/dev/null | grep -m1 -E '/(include)/cuda\.h$')")"
          CUDA_STUB="$(dirname "$(find / -name 'libcuda.so' 2>/dev/null | head -1)")"
          NVRTC_H="$(dirname "$(find / -name nvrtc.h 2>/dev/null | head -1)")"
          NVRTC_L="$(dirname "$(find / -name 'libnvrtc.so*' 2>/dev/null | head -1)")"
          echo "cuda.h in: $CUDA_H   libcuda stub in: $CUDA_STUB"
          test -n "$CUDA_H" && test -n "$CUDA_STUB" || { echo "::error::driver API not found"; exit 1; }
          c++ -std=c++11 -O2 -I ofx/Expression -I"$NVRTC_H" -I"$CUDA_H" \
            tests/test_cuda_run.cpp -o test_cuda_run \
            -L"$NVRTC_L" -lnvrtc -L"$CUDA_STUB" -lcuda
          echo "test_cuda_run linked OK (driver API); runtime run happens on the GPU box"

  build:
    name: build ${{ matrix.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: linux-x86-64 }
          - { os: macos-latest,  name: macos-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux links the OFX Support lib against -lGL (see Makefile.master).
      - name: Install Linux GL headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev

      - name: Clone the OpenFX SDK
        run: git clone --depth 1 https://github.com/AcademySoftwareFoundation/openfx

      # Same path verified by hand on macOS: drop the plugin into the Support
      # examples tree so Makefile.master compiles the Support lib + assembles the
      # .ofx.bundle (with its Info.plist and the per-platform arch dir:
      # Contents/Linux-x86-64 or Contents/MacOS). DEBUGFLAG=-O2 optimises while
      # keeping DEBUGNAME=debug so the macOS-only osxDeploy.sh step is skipped.
      - name: Build Expression.ofx.bundle
        run: |
          cp -R ofx/Expression openfx/Support/Plugins/Expression
          make -C openfx/Support/Plugins/Expression DEBUGFLAG=-O2

      - name: Locate + sanity-check the bundle
        id: bundle
        run: |
          BUNDLE=$(find openfx/Support/Plugins/Expression -type d -name 'Expression.ofx.bundle' | head -1)
          OFX=$(find "$BUNDLE" -type f -name 'Expression.ofx' | head -1)
          test -n "$OFX" || { echo "::error::no Expression.ofx produced"; exit 1; }
          echo "Built: $OFX"
          file "$OFX"
          # the OFX C entry point must be exported, or no host can load it
          nm -g "$OFX" | grep -q OfxGetPlugin && echo "exports OfxGetPlugin: OK" \
            || { echo "::error::OfxGetPlugin not exported"; exit 1; }
          echo "bundle=$BUNDLE" >> "$GITHUB_OUTPUT"

      - name: Upload the .ofx.bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: Expression.ofx-${{ matrix.name }}
          path: ${{ steps.bundle.outputs.bundle }}
          if-no-files-found: error
